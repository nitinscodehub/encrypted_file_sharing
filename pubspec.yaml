name: encrypted_file_sharing
description: Secure file sharing with AES-256 encryption
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  file_picker: ^8.0.0
  path_provider: ^2.1.2
  path: ^1.9.0
  encrypt: ^5.0.3
  crypto: ^3.0.3
  shared_preferences: ^2.2.2
  provider: ^6.1.2
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
